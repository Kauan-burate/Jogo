<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restauração do Museu</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

<div class="container">

    <header>
        <nav class="navbar bg-body-tertiary">
            <div class="container-fluid">
              <a class="navbar-brand" href="#">
                <img src="./assets/img/icone principal.png" alt="Logo" width="50" height="24" class="d-inline-block align-text-top">
                <p>🏛️ Restauração do Museu </p>
                <p>Encontre os pares e restaure a obra </p>
              </a>
            </div>
          </nav>
        
    </header>

    <section class="game-area">

        <div class="memory-section">
            <h2>Memória</h2>

            <div id="memory-board"></div>

            <div class="stats">
                <span>Pares: <strong id="pairs">0</strong></span>
            </div>
        </div>

        <div class="puzzle-section">
            <h2 id="obraRestaurada">Obra Restaurada</h2>

            <div id="puzzle-board">
                <div class="slot" data-slot="0"></div>
                <div class="slot" data-slot="1"></div>
                <div class="slot" data-slot="2"></div>
                <div class="slot" data-slot="3"></div>
                <div class="slot" data-slot="4"></div>
                <div class="slot" data-slot="5"></div>
                <div class="slot" data-slot="6"></div>
                <div class="slot" data-slot="7"></div>
            </div>

            <h3 id ="pecasGanhas">Peças Ganhas</h3>

            <div id="pieces-container"></div>

            <div id="winnerMessage"></div>

        </div>

    </section>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="./app.js"></script>
</body>

</html>
